<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <foreignObject width="400" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;background:linear-gradient(160deg, hsl(40, 16%, 89%) 0%, hsl(35, 14%, 76%) 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box;">
      <div style="font-family:'Songti SC',STSong,STKaiti,KaiTi,serif;font-style:italic;font-size:17px;color:rgba(196,165,116,0.75);line-height:1.7;text-align:center;max-width:320px;">
        <style>p{margin:0 0 12px 0;}p:last-child{margin:0;}p::first-letter{font-size:1.5em;font-weight:600;line-height:1;}</style>
        <p>那年冬天，我父亲送了我一支毛笔。</p><p>他说，笔是有重量的。</p><p>十年后，这支笔还在，<br/>但它的重量，落到了更多人的手里。</p>
      </div>
    </div>
  </foreignObject>
</svg>