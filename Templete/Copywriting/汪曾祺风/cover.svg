<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <foreignObject width="400" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;background:linear-gradient(160deg, hsl(30, 10%, 84%) 0%, hsl(25, 10%, 68%) 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box;">
      <div style="font-family:'Songti SC',STSong,STKaiti,KaiTi,serif;font-style:italic;font-size:17px;color:rgba(74,90,72,0.70);line-height:1.7;text-align:center;max-width:320px;">
        <style>p{margin:0 0 12px 0;}p:last-child{margin:0;}p::first-letter{font-size:1.5em;font-weight:600;line-height:1;}</style>
        <p>如果你来访我，我不在，<br/>请和我门外的花坐一会儿。</p><p>它们很温暖，<br/>我注视它们很久了。</p>
      </div>
    </div>
  </foreignObject>
</svg>