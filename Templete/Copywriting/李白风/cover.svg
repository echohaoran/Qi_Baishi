<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <foreignObject width="400" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;background:linear-gradient(160deg, hsl(80, 12%, 82%) 0%, hsl(70, 10%, 62%) 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box;">
      <div style="font-family:'Songti SC',STSong,STKaiti,KaiTi,serif;font-style:italic;font-size:17px;color:rgba(106,138,138,0.75);line-height:1.7;text-align:center;max-width:320px;">
        <style>p{margin:0 0 12px 0;}p:last-child{margin:0;}p::first-letter{font-size:1.5em;font-weight:600;line-height:1;}</style>
        <p>飞流直下三千尺，<br/>疑是银河落九天。</p><p>举杯邀明月，<br/>对影成三人。</p>
      </div>
    </div>
  </foreignObject>
</svg>