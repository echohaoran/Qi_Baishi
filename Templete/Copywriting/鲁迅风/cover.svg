<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <foreignObject width="400" height="300">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;background:linear-gradient(160deg, hsl(220, 5%, 72%) 0%, hsl(220, 6%, 48%) 100%);position:relative;display:flex;align-items:center;justify-content:center;padding:32px;box-sizing:border-box;">
      <div style="font-family:'Songti SC',STSong,STKaiti,KaiTi,serif;font-style:italic;font-size:17px;color:rgba(29,24,20,0.90);line-height:1.7;text-align:center;max-width:320px;">
        <style>p{margin:0 0 12px 0;}p:last-child{margin:0;}p::first-letter{font-size:1.5em;font-weight:600;line-height:1;}</style>
        <p>沉默啊，沉默。</p><p>不在沉默中爆发，<br/>就在沉默中灭亡。</p><p>这世上最可怕的，<br/>从来不是刀剑。</p>
      </div>
    </div>
  </foreignObject>
</svg>