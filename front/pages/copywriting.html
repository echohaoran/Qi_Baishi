<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>妙笔生花 · 白石 Baishi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  
  
  <link rel="stylesheet" href="../css/ink-wash.css" />
  <link rel="stylesheet" href="../css/app-chrome.css" />
  <link rel="stylesheet" href="../css/page-loader.css" />
  <link rel="stylesheet" href="../css/copywriting.css" />
<script>try{var t=localStorage.getItem("baishi.theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
<script src="../js/page-loader.js"></script>
</head>
<body class="ink-wash-bg">
  <!-- 水墨加载动画 -->
  <div class="page-loader" id="page-loader"><div class="loader-ink"></div></div>
  <div class="window">
    <header class="titlebar">
      <div class="lights"><span class="light close"></span><span class="light min"></span><span class="light max"></span></div>
      <div class="title"><span class="seal sm" style="background:url(../../assets/logo.png) center/cover;color:transparent;">白</span><span>白石 · 妙笔生花</span></div>
      <div class="right">
        <div class="os-toggle"><button type="button" data-os-set="macos" class="active">macOS</button><button type="button" data-os-set="windows">Windows</button></div>
        <button type="button" class="icon-btn" aria-label="搜索"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M4 12h16M4 17h10"/></svg></button>
      </div>
    </header>

    <div class="app">
      <aside class="sidebar">
        <div class="brand"><span class="seal" style="background:url(../../assets/logo.png) center/cover;color:transparent;">白</span><div><div class="name">白石</div><div class="en">BAISHI · v0.0.1_test</div></div></div>
        <div class="nav-section">创作</div>
        <a href="workspace.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>工作台</a>
        <a href="copywriting.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 38V14a4 4 0 0 1 4-4h24a4 4 0 0 1 4 4v20a4 4 0 0 1-4 4H12a4 4 0 0 1-4-4Z"/><path d="M16 18h16M16 24h12M16 30h8"/></svg>文生文</a><a href="text-to-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M4 12h16M4 17h10"/></svg>文生图</a>
        <a href="image-to-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>图生图</a>
        <a href="multi-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/><path d="M6 10v4M10 6h4M14 18h4M18 14v-4"/></svg>多图融合</a>


        <div class="nav-section">资源</div>
        <a href="presets.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6Z"/></svg>灵感墙</a>
        <a href="history.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>历史作品</a>
        <div class="nav-section">账户</div>
        <a href="settings.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/></svg>设置</a>

      </aside>

      <main class="content">
        <div class="content-header">
          <div class="title-block">
            <span class="crumb">灵感墙 · 妙笔生花</span>
            <h1>妙笔生花 <span class="brush" style="color: var(--accent);">文思泉涌</span></h1>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-secondary" id="import-template-btn">导入模板</button>
            <input type="file" id="import-template-file" accept=".json,application/json" hidden />
            <button type="button" class="btn btn-primary" id="generate-btn">生成文案</button>
          </div>
        </div>

        <div class="content-body">
          <!-- 文案模板快捷选择 → 从妙笔生花板块随机抽取 -->
          <section data-od-id="templates" role="region" aria-labelledby="h-templates">
            <p class="eyebrow" id="h-templates" style="margin-bottom: var(--space-4);">快捷模板 <span style="font-weight:400;color:var(--muted);font-size:12px;text-transform:none;letter-spacing:0;">· 妙笔生花随机精选</span></p>
            <div class="grid-3" id="quick-templates" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-5);">
              <!-- 由 JS 动态填充 -->
            </div>
          </section>

          <!-- 工作区 -->
          <section data-od-id="workspace" role="region" aria-labelledby="h-workspace" style="margin-top: var(--space-12);">
            <h3 class="sr-only" id="h-workspace">文案工作区</h3>
            <div class="copy-workspace">
              <div class="copy-input-panel">
                <div class="panel-header">
                  <h4>输入需求</h4>
                  <button type="button" class="btn btn-ghost btn-sm" id="clear-input" style="font-size: 12px; color: var(--muted);">清空</button>
                </div>
                <div class="panel-body">
                  <label for="copy-input" class="sr-only">文案需求输入框</label>
                  <textarea class="textarea-copy" id="copy-input" rows="10" placeholder="描述你的文案需求，例如：&#10;为我写一段水墨风格品牌介绍，200字以内，面向高端设计师群体，突出东方美学与当代极简的融合。" aria-label="文案需求输入框"></textarea>
                  <div class="copy-actions"></div>
                </div>
              </div>

              <div class="copy-output-panel">
                <div class="panel-header">
                  <h4>生成结果</h4>
                  <div style="display: flex; align-items: center; gap: var(--space-2);">
                    <div class="output-view-toggle" id="output-view-toggle" hidden>
                      <button type="button" class="output-view-btn active" id="review-view-btn" data-output-view="review" aria-pressed="true">审阅视图</button>
                      <button type="button" class="output-view-btn" id="edit-view-btn" data-output-view="edit" aria-pressed="false">编辑视图</button>
                    </div>
                    <span class="output-edit-flag" id="output-edit-flag" hidden>
                      <span class="dot" aria-hidden="true"></span>
                      <span>已编辑</span>
                    </span>
                    <span class="output-char-count" id="output-char-count" hidden>0 字</span>
                    <button type="button" class="btn btn-ghost btn-sm" id="copy-result" style="font-size: 12px; color: var(--muted);">复制</button>
                    <button type="button" class="btn btn-ghost btn-sm" id="save-preset" style="font-size: 12px; color: var(--muted);">存为模板</button>
                  </div>
                </div>
                <div class="panel-body">
                  <div class="output-placeholder" id="output-placeholder">
                    <svg viewBox="0 0 48 48" fill="none" stroke="var(--muted)" stroke-width="1.2" style="width:40px;height:40px;margin:0 auto var(--space-3);display:block;">
                      <path d="M8 36V16a4 4 0 0 1 4-4h24a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4H12a4 4 0 0 1-4-4Z"/>
                      <path d="M16 20h16M16 26h10"/>
                    </svg>
                    输入需求后点击「生成文案」
                  </div>
                  <div class="output-loading" id="output-loading" hidden>
                    <div class="ink-stage" aria-hidden="true">
                      <div class="ink-ripple ink-ripple-3"></div>
                      <div class="ink-ripple ink-ripple-2"></div>
                      <div class="ink-ripple ink-ripple-1"></div>
                      <div class="ink-drop"></div>
                    </div>
                    <p class="loading-status" id="output-loading-status">笔意化境中…</p>
                    <p class="loading-hint" id="output-loading-hint">AI 文思正在凝聚</p>
                    <div class="brush-bar"><div class="brush-fill" id="output-loading-bar"></div></div>
                    <p class="loading-step" id="output-loading-step">正在连接后端</p>
                  </div>
                  <div class="output-review markdown-body" id="output-review" aria-label="生成结果审阅视图" style="display: none;"></div>
                  <div class="output-text" id="output-text" contenteditable="true" spellcheck="false" role="textbox" aria-multiline="true" aria-label="生成的文案内容（可直接编辑）" data-placeholder="生成结果将出现在这里，可直接编辑修改…" style="display: none;"></div>
                  <div class="output-actions" id="output-actions" style="display: none;">
                    <button type="button" class="btn btn-secondary btn-sm" id="copy-result-all">复制全文</button>
                    <button type="button" class="btn btn-secondary btn-sm" id="polish-result">一键润色</button>
                    <button type="button" class="btn btn-secondary btn-sm" id="regenerate-result">重新生成</button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- 历史记录 -->
          <section data-od-id="history" role="region" aria-labelledby="h-history">
            <p class="eyebrow" id="h-history" style="margin-bottom: var(--space-4);">历史记录</p>
            <div class="gen-history" id="gen-history">
              <button type="button" class="history-item" data-prompt="请撰写一段品牌故事，要求：&#10;1. 融合中国传统水墨美学与现代极简主义&#10;2. 面向设计师、艺术家群体&#10;3. 200字以内&#10;4. 突出文化传承与创新精神" aria-label="回填历史：品牌故事 · 今天 14:32">
                <span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6Z"/></svg></span>
                <span class="text">
                  <span class="preview-text">品牌故事：水墨之韵，源自千年文人山水…</span>
                  <span class="meta">营销 · 今天 14:32</span>
                </span>
              </button>
              <button type="button" class="history-item" data-prompt="请撰写一段产品描述文案，要求：&#10;1. 介绍一款 AI 水墨图像生成工具&#10;2. 强调水墨质感、笔触自然、留白意境&#10;3. 100字以内，适合电商详情页" aria-label="回填历史：产品描述 · 今天 11:05">
                <span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6Z"/></svg></span>
                <span class="text">
                  <span class="preview-text">产品描述：白石 AI · 一款融合传统水墨…</span>
                  <span class="meta">产品 · 今天 11:05</span>
                </span>
              </button>
              <button type="button" class="history-item" data-prompt="请撰写一句广告语，要求：&#10;1. 水墨风格产品广告&#10;2. 一句话打动人心&#10;3. 不超过20个字" aria-label="回填历史：广告语 · 昨天 21:18">
                <span class="icon-wrap" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="1.5"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6Z"/></svg></span>
                <span class="text">
                  <span class="preview-text">广告语：挥毫之间，天地入画…</span>
                  <span class="meta">广告 · 昨天 21:18</span>
                </span>
              </button>
            </div>
          </section>
        </div>

        <div class="statusbar">
          <span class="item"><span class="dot"></span>开源版 · 无调用限制</span>
          <span class="spacer"></span>
          <span class="item">⌘ + ↵ 生成</span>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-host" id="toasts" role="status" aria-live="polite"></div>

  <!-- 存为模板 · 名称输入模态 -->
  <div class="modal-host" id="save-preset-modal" hidden>
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="save-preset-title">
      <div class="modal-head">
        <h4 id="save-preset-title">存为模板</h4>
        <button type="button" class="icon-btn" data-modal-close aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label for="save-preset-name">模板名称</label>
          <input type="text" class="input" id="save-preset-name" placeholder="例：东方美学品牌故事" maxlength="40" />
        </div>
        <div class="field">
          <label for="save-preset-cat">分类</label>
          <select class="select" id="save-preset-cat">
            <option>品牌</option>
            <option>产品</option>
            <option>营销</option>
            <option>社交</option>
            <option>标题</option>
            <option>广告</option>
            <option>其他</option>
          </select>
        </div>
        <p class="modal-hint">保存后将出现在「灵感墙 · 妙笔生花」面板，可随时调用</p>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost btn-sm" data-modal-close>取消</button>
        <button type="button" class="btn btn-primary btn-sm" id="save-preset-confirm">保存</button>
      </div>
    </div>
  </div>

  <script src="../js/baishi-shared.js"></script>
  <script src="../js/api-client.js"></script>
  <script src="../js/text-styles.js"></script>
  <script src="../js/copywriting.js"></script>
</body>
</html>
