<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 · 白石 Baishi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />


  <link rel="stylesheet" href="../css/ink-wash.css" />
  <link rel="stylesheet" href="../css/app-chrome.css" />
  <link rel="stylesheet" href="../css/auth.css" />
<script>try{var t=localStorage.getItem("baishi.theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
</head>
<body class="ink-wash-bg">
  <div class="mobile-strip" aria-hidden="true">
    <span class="seal" style="background:url(../../assets/logo.png) center/cover;color:transparent;">白</span>
    <span class="ms-name">白石</span>
    <span class="ms-en">BAISHI</span>
  </div>

  <aside class="promo" aria-label="品牌与产品介绍">
    <div class="top">
      <ul class="features" aria-label="产品能力">
        <li>文生图</li><li aria-hidden="true" class="dot">·</li>
        <li>图生图</li><li aria-hidden="true" class="dot">·</li>
        <li>笔意预设</li><li aria-hidden="true" class="dot">·</li>
        <li>本地推理</li>
      </ul>
    </div>

    <div class="middle">
      <p class="eyebrow">以水墨 · 造万象</p>
      <h1 class="tagline">落笔之处，<br><span class="accent">万象生焉</span>。</h1>
      <p class="lead">为创作者而生的桌面生图工具 · 支持在线API+本地推理 · 笔意可调 · 灵感可循</p>
    </div>

    <div class="bottom">
      <figure class="quote">
        <blockquote>用了白石，飞白山水的笔意终于可调可控，再不用在 50 张 SDXL 出图里捞那一张对的。</blockquote>
        <figcaption>
          <span class="seal-mini" style="background:url(../../assets/logo.png) center/cover;color:transparent;">白</span>
          <span class="cite"><span class="name">EchoWang</span><span class="role">全栈开发工程师</span></span>
        </figcaption>
      </figure>
    </div>
  </aside>

  <main class="auth-side">
    <div class="auth-card fade-in">
      <h1 id="auth-title">欢迎回来</h1>
      <p class="sub" id="auth-sub">以企业邮箱 + 密码登录你的白石</p>

      <form id="auth-form" autocomplete="off" novalidate>
        <div class="field" data-field="email">
          <label for="email">企业邮箱</label>
          <div class="input-row">
            <input type="email" class="input" id="email" name="email" placeholder="you@company.com" required aria-describedby="email-err" />
            <button type="button" class="btn btn-secondary btn-sm" id="send-code-btn" hidden aria-controls="code" aria-describedby="code-hint">发送验证码</button>
          </div>
          <p class="field-err" id="email-err" role="alert" aria-live="polite"></p>
        </div>
        <div class="field" id="code-field" data-field="code" style="display: none;">
          <label for="code">验证码</label>
          <input type="text" class="input mono" id="code" name="code" placeholder="请输入 6 位数字" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" aria-describedby="code-hint code-err" />
          <p class="field-hint" id="code-hint">已发送至企业邮箱，10 分钟内有效</p>
          <p class="field-err" id="code-err" role="alert" aria-live="polite"></p>
        </div>
        <div class="field" data-field="password">
          <label for="password">密码</label>
          <div class="input-row">
            <input type="password" class="input" id="password" name="password" placeholder="至少 8 位，含字母与数字" required minlength="8" aria-describedby="password-err" />
            <button type="button" class="reveal-toggle" id="reveal-password" aria-label="显示密码" aria-pressed="false">显示</button>
          </div>
          <p class="field-err" id="password-err" role="alert" aria-live="polite"></p>
        </div>
        <div class="field" id="confirm-field" data-field="confirm" style="display: none;">
          <label for="confirm">确认密码</label>
          <input type="password" class="input" id="confirm" name="confirm" placeholder="再输入一次" aria-describedby="confirm-err" />
          <p class="field-err" id="confirm-err" role="alert" aria-live="polite"></p>
        </div>

        <div class="auth-actions">
          <label class="remember" for="remember">
            <input type="checkbox" id="remember" name="remember" />
            <span class="box" aria-hidden="true"></span>
            <span class="remember-text">记住我</span>
          </label>
          <button type="button" class="link-btn" id="forgot-link">忘记密码？</button>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn" aria-busy="false">
          <span class="btn-label">登录</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </form>

      <div class="divider" role="separator"><span>或</span></div>

      <div class="social">
        <button type="button" class="btn btn-secondary" aria-label="使用 GitHub 账户登录">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6V21c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.9 1.2 1.9 1.2 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.8-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3"/></svg>
          <span>使用 GitHub 登录</span>
        </button>
        <button type="button" class="btn btn-secondary" aria-label="使用 Apple ID 登录">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25"/></svg>
          <span>使用 Apple ID 登录</span>
        </button>
      </div>

      <p class="switch">
        <span id="switch-text">还没有账户？</span>
        <button type="button" class="link-btn" id="switch-link">立即注册</button>
      </p>
    </div>

    <div class="corner-seal">
      <span class="seal lg" style="background:url(../../assets/logo.png) center/cover;color:transparent;">白</span>
      <span class="meta">BAISHI · v0.4.2</span>
    </div>
  </main>

  <div class="toast-host" id="toasts" role="status" aria-live="polite"></div>


  <script src="../js/auth.js"></script>
</body>
</html>
