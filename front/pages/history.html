<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>历史作品 · 白石 Baishi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/ink-wash.css" />
  <link rel="stylesheet" href="../css/app-chrome.css" />
  <link rel="stylesheet" href="../css/page-loader.css" />
  <link rel="stylesheet" href="../css/history.css" />
<script>try{var t=localStorage.getItem("baishi.theme")||"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}</script>
<script src="../js/page-loader.js"></script>
</head>
<body class="ink-wash-bg">
  <!-- 水墨加载动画 -->
  <div class="page-loader" id="page-loader"><div class="loader-ink"></div></div>
  <div class="window">
    <header class="titlebar">
      <div class="lights"><span class="light close"></span><span class="light min"></span><span class="light max"></span></div>
      <div class="title" style="-webkit-app-region: drag;"><span class="seal sm" style="background:url(../assets/logo.png) center/cover;color:transparent;">白</span><span>白石 · 历史作品</span></div>
      <div class="right">
        <button type="button" class="icon-btn" aria-label="日历视图"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M8 6V4M16 6V4M3 10h18M5 16h14M5 20h14"/></svg></button>
        <button type="button" class="icon-btn" aria-label="导出"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></button>
      </div>
    </header>

    <div class="app">
      <aside class="sidebar">
        <div class="brand"><span class="seal" style="background:url(../assets/logo.png) center/cover;color:transparent;">白</span><div><div class="name">白石</div><div class="en">BAISHI · v0.0.1_test</div></div></div>
        <div class="nav-scroll">
        <div class="nav-section">创作</div>
        <a href="workspace.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>工作台</a>
        <a href="copywriting.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8 38V14a4 4 0 0 1 4-4h24a4 4 0 0 1 4 4v20a4 4 0 0 1-4 4H12a4 4 0 0 1-4-4Z"/><path d="M16 18h16M16 24h12M16 30h8"/></svg>文生文</a><a href="text-to-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M4 12h16M4 17h10"/></svg>文生图</a>
        <a href="image-to-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>图生图</a>
        <a href="multi-image.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/><path d="M6 10v4M10 6h4M14 18h4M18 14v-4"/></svg>多图融合</a>


        <div class="nav-section">资源</div>
        <a href="presets.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6Z"/></svg>灵感墙</a>
        <a href="history.html" class="nav-item active" aria-current="page"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>历史作品</a>
        <div class="nav-section">账户</div>
        <a href="settings.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/></svg>设置</a>
              </div>

        <div class="foot">
          <div class="page-indicator">当前页面</div>
          <div class="page-indicator-value">历史作品</div>
        </div>
      </aside>

      <main class="content">
        <div class="content-header">
          <div class="title-block">
            <span class="crumb">资源 · 历史作品</span>
            <h1>历史作品 <span class="brush" style="color: var(--accent);">历史长卷</span></h1>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-secondary" data-action="export-zip" aria-label="导出全部作品为 ZIP 包">导出 ZIP</button>
            <button type="button" class="btn btn-secondary" data-action="toggle-select" id="toggle-select-btn" aria-pressed="false" aria-label="进入管理模式以批量删除作品">管理</button>
            <a href="text-to-image.html" class="btn btn-primary">＋ 新建作品</a>
          </div>
        </div>

        <div class="content-body">
          <div class="hist-toolbar" data-od-id="toolbar" role="search" aria-label="作品筛选">
            <div class="input-search" style="position: relative;">
              <label for="hist-search" class="sr-only">搜索</label>
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
              <input type="search" id="hist-search" class="input" placeholder="搜索提示词 · 风格 · 标签" style="padding-left: 36px;" aria-label="搜索提示词、风格或标签" autocomplete="off" />
            </div>
            <label for="hist-type" class="sr-only">按类型筛选</label>
            <select id="hist-type" class="select" style="width: 130px;" aria-label="按类型筛选">
              <option value="all">全部类型</option>
              <option value="text-to-image">文生图</option>
              <option value="image-to-image">图生图</option>
              <option value="text-to-text">文生文</option>
              <option value="favorites">收藏</option>
            </select>
            <label for="hist-style" class="sr-only">按风格筛选</label>
            <select id="hist-style" class="select" style="width: 130px;" aria-label="按风格筛选">
              <option value="all">全部风格</option>
              <option value="飞白">飞白山水</option>
              <option value="工笔">工笔花鸟</option>
              <option value="水墨">现代水墨</option>
              <option value="brand">品牌故事</option>
              <option value="marketing">营销文案</option>
              <option value="headline">标题党</option>
              <option value="lifestyle">生活方式</option>
            </select>
            <button type="button" class="btn btn-ghost btn-sm" data-action="advanced-filter" aria-label="打开高级筛选">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3Z"/></svg>
              高级筛选
            </button>
            <span class="spacer"></span>
            <span class="meta" aria-live="polite" aria-atomic="true">共 <span class="num" id="hist-total" style="color: var(--accent); font-weight: 600;">0</span> 件 · 已收藏 <span class="num" id="hist-fav-count" style="color: var(--accent); font-weight: 600;">0</span></span>
          </div>

          <div class="batch-bar" id="batch-bar" hidden role="region" aria-label="批量操作">
            <span class="batch-label">已选 <strong id="batch-count" style="color: var(--accent);">0</strong> / <span id="batch-total" style="color: var(--accent);">0</span> 件</span>
            <button type="button" class="btn btn-ghost btn-sm" data-action="select-all" aria-label="全选">全选</button>
            <button type="button" class="btn btn-ghost btn-sm" data-action="select-invert" aria-label="反选">反选</button>
            <span class="spacer"></span>
            <button type="button" class="btn btn-danger btn-sm" data-action="batch-delete-confirm" aria-label="删除选中的所有作品">删除选中</button>
            <button type="button" class="btn btn-ghost btn-sm" data-action="batch-cancel" aria-label="退出多选模式">取消</button>
          </div>

          <section data-od-id="today" aria-labelledby="date-today">
            <div class="date-header"><h3 id="date-today">今天 · 6 月 29 日</h3><span class="meta" data-section-count>4 件</span></div>
            <div class="hist-grid"></div>
          </section>

          <section data-od-id="yesterday" aria-labelledby="date-yesterday">
            <div class="date-header"><h3 id="date-yesterday">昨天 · 6 月 28 日</h3><span class="meta" data-section-count>4 件</span></div>
            <div class="hist-grid"></div>
          </section>

          <section data-od-id="earlier" aria-labelledby="date-earlier">
            <div class="date-header"><h3 id="date-earlier">本周 · 6 月 23 - 27 日</h3><span class="meta" data-section-count>4 件</span></div>
            <div class="hist-grid"></div>
          </section>

          <section data-od-id="copywriting" aria-labelledby="date-copywriting">
            <div class="date-header"><h3 id="date-copywriting">妙笔生花 · 文生文作品</h3><span class="meta" data-section-count>4 件</span></div>
            <div class="hist-grid"></div>
          </section>
          <div style="text-align: center; padding: var(--space-8) 0;">
            <button type="button" class="btn btn-ghost btn-arrow" id="load-more" aria-busy="false">加载更早作品</button>
          </div>
        </div>

        <div class="statusbar">
          <span class="item"><span class="dot"></span>本地缓存 · <span class="num" data-cache-used>4.2 GB</span> / <span class="num" data-cache-total>10 GB</span></span>
          <span class="item">已备份至本地 · 6 月 28 日</span>
          <span class="spacer"></span>
          <span class="item">⌘ + D 下载选中</span>
        </div>
      </main>
    </div>
  </div>

  <div class="toast-host" id="toasts" role="status" aria-live="polite"></div>


  <script src="../js/baishi-shared.js"></script>
  <script src="../js/api-client.js"></script>
  <script src="../js/history.js"></script>
</body>
</html>
