name: build-installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-arm64-dmg:
    name: macOS arm64 dmg
    runs-on: macos-15
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Build arm64 dmg
        working-directory: src-tauri
        run: cargo tauri build --bundles dmg --target aarch64-apple-darwin --no-sign

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg dist/BaiShi-arm64.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiShi-arm64-dmg
          path: dist/BaiShi-arm64.dmg
          retention-days: 14

  macos-intel-dmg:
    name: macOS intel dmg
    runs-on: macos-15-intel
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Build intel dmg
        working-directory: src-tauri
        run: cargo tauri build --bundles dmg --target x86_64-apple-darwin --no-sign

      - name: Collect artifact
        run: |
          mkdir -p dist
          cp src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg dist/BaiShi-intel.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiShi-intel-dmg
          path: dist/BaiShi-intel.dmg
          retention-days: 14

  windows-x64-exe:
    name: Windows x64 exe
    runs-on: windows-2025
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Build x64 NSIS installer
        working-directory: src-tauri
        run: cargo tauri build --bundles nsis --target x86_64-pc-windows-msvc

      - name: Collect artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $installer = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "dist/BaiShi-x86_64-setup.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaiShi-x86_64-exe
          path: dist/BaiShi-x86_64-setup.exe
          retention-days: 14

  linux-x64-packages:
    name: Linux x64 deb rpm
    runs-on: ubuntu-22.04
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            xdg-utils

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0.0' --locked

      - name: Build deb and rpm
        working-directory: src-tauri
        run: cargo tauri build --bundles deb,rpm --target x86_64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb dist/BaiShi-x86_64.deb
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm dist/BaiShi-x86_64.rpm

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: BaiShi-x86_64-deb
          path: dist/BaiShi-x86_64.deb
          retention-days: 14

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: BaiShi-x86_64-rpm
          path: dist/BaiShi-x86_64.rpm
          retention-days: 14

  release:
    name: Publish to GitHub Releases
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - macos-arm64-dmg
      - macos-intel-dmg
      - windows-x64-exe
      - linux-x64-packages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "==> Tree of artifacts/:"
          find artifacts -type f -printf "%p (%s bytes)\n" | sort
          echo
          echo "==> Top-level artifact dirs:"
          ls -1 artifacts

      - name: Stage release files
        run: |
          set -e
          # 把不同子目录里的产物统一到 release/ 目录，文件名为最终 release 资产名
          mkdir -p release
          declare -A pairs=(
            ["BaiShi-arm64-dmg/BaiShi-arm64.dmg"]="BaiShi-arm64.dmg"
            ["BaiShi-intel-dmg/BaiShi-intel.dmg"]="BaiShi-intel.dmg"
            ["BaiShi-x86_64-exe/BaiShi-x86_64-setup.exe"]="BaiShi-x86_64-setup.exe"
            ["BaiShi-x86_64-deb/BaiShi-x86_64.deb"]="BaiShi-x86_64.deb"
            ["BaiShi-x86_64-rpm/BaiShi-x86_64.rpm"]="BaiShi-x86_64.rpm"
          )
          for src in "${!pairs[@]}"; do
            dst="release/${pairs[$src]}"
            # download-artifact 可能在顶层，也可能在 artifacts/<name>/ 下，先做模糊匹配
            found=$(find artifacts -type f -name "$(basename "$src")" | head -n 1 || true)
            if [ -n "$found" ] && [ -e "$found" ]; then
              cp -f "$found" "$dst"
              echo "  staged: $dst <- $found"
            else
              echo "  MISSING: artifacts/**/${src}"
            fi
          done
          echo
          echo "==> release/ contents:"
          ls -la release

          if [ -z "$(ls -A release 2>/dev/null)" ]; then
            echo "::error::No release artifacts were downloaded. Aborting release."
            exit 1
          fi

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -n 1 || true)
          if [ -z "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "First release - ${VERSION}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            git log --oneline --no-decorate "${PREV_TAG}..HEAD" 2>/dev/null || echo "Initial release" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BaiShi v${{ steps.notes.outputs.version }}
          fail_on_unmatched_files: true
          body: |
            ## 白石 BaiShi v${{ steps.notes.outputs.version }}

            ${{ steps.notes.outputs.changelog }}

            ### Downloads

            | Platform | Architecture | Format | File |
            |----------|--------------|--------|------|
            | macOS    | Apple Silicon (M1+) | DMG | `BaiShi-arm64.dmg` |
            | macOS    | Intel              | DMG | `BaiShi-intel.dmg` |
            | Windows  | x64                | NSIS Installer | `BaiShi-x86_64-setup.exe` |
            | Linux    | x64                | DEB | `BaiShi-x86_64.deb` |
            | Linux    | x64                | RPM | `BaiShi-x86_64.rpm` |

            ### Notes
            - macOS builds are **unsigned** - you may need to right-click -> Open to bypass Gatekeeper.
            - Windows build is an NSIS installer.
            - Linux DEB/RPM are provided for Debian/Ubuntu and Fedora/RHEL-based distributions respectively.
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          files: |
            release/BaiShi-arm64.dmg
            release/BaiShi-intel.dmg
            release/BaiShi-x86_64-setup.exe
            release/BaiShi-x86_64.deb
            release/BaiShi-x86_64.rpm
